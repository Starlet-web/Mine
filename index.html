<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSIR NET Research Portal</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .auth-box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      width: 400px;
    }
    h2 { text-align: center; color: #0a2e1f; margin-bottom: 10px; }
    p { text-align: center; color: #666; font-size: 14px; margin-bottom: 25px; }
    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }
    input:focus { border-color: #0a2e1f; outline: none; }
    button {
      width: 100%;
      padding: 14px;
      background: #0a2e1f;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
    }
    button:hover { background: #0d3a28; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .toggle-btn {
      background: none;
      color: #0a2e1f;
      border: 1px solid #0a2e1f;
      font-size: 14px;
    }
    .toggle-btn:hover { background: #f0f5ea; }
    .error { color: red; text-align: center; font-size: 14px; min-height: 20px; margin: 10px 0; }
    .success { color: green; text-align: center; font-size: 14px; }
    .chat-area { display: none; }
    .chat-area.active { display: block; }
    .message-box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }
    .msg { padding: 10px; margin: 5px 0; border-radius: 8px; background: #e8f5e9; }
    .msg.own { background: #c8e6c9; text-align: right; }
    .input-area { display: flex; gap: 10px; margin-top: 15px; }
    .input-area input { flex: 1; margin-bottom: 0; }
    .input-area button { width: auto; padding: 12px 20px; }
  </style>
</head>
<body>

<div id="authScreen">
  <div class="auth-box">
    <h2>🔬 CSIR NET Research Portal</h2>
    <p id="modeText">Login to access research portal</p>
    
    <input type="email" id="emailInput" placeholder="Email address">
    <input type="password" id="passwordInput" placeholder="Password">
    
    <button id="authBtn" onclick="handleAuth()">Access Research Portal</button>
    <div class="error" id="errorMsg"></div>
    <div class="success" id="successMsg"></div>
    
    <button class="toggle-btn" onclick="toggleMode()">New Scholar? Register here</button>
  </div>
</div>

<div id="chatScreen" style="display:none;">
  <div class="auth-box" style="width:600px;">
    <h2>✅ Logged In Successfully!</h2>
    <p id="userEmail"></p>
    
    <div class="message-box">
      <h3>💬 Messages</h3>
      <div id="messages"></div>
    </div>
    
    <div class="input-area">
      <input type="text" id="msgInput" placeholder="Type message...">
      <button onclick="sendMessage()">Send</button>
    </div>
    
    <button onclick="logout()" style="background:#c6453a; margin-top:15px;">Logout</button>
  </div>
</div>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDS0rzCKglHblF2dlFEKE-ouV0yOu0z5UM",
  authDomain: "mine-a1e68.firebaseapp.com",
  projectId: "mine-a1e68",
  storageBucket: "mine-a1e68.firebasestorage.app",
  messagingSenderId: "48499757892",
  appId: "1:48499757892:web:d0fd281ab0df945e893d11"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

console.log('Firebase initialized');

let loginMode = true;

function toggleMode() {
  loginMode = !loginMode;
  document.getElementById('authBtn').textContent = loginMode ? 'Access Research Portal' : 'Register Scholar';
  document.getElementById('modeText').textContent = loginMode ? 'Login to access research portal' : 'Register for research portal';
  document.querySelector('.toggle-btn').textContent = loginMode ? 'New Scholar? Register here' : 'Already registered? Login';
  document.getElementById('errorMsg').textContent = '';
}

async function handleAuth() {
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value.trim();
  
  document.getElementById('errorMsg').textContent = '';
  document.getElementById('authBtn').disabled = true;
  
  if (!email || !password) {
    document.getElementById('errorMsg').textContent = 'Please fill all fields';
    document.getElementById('authBtn').disabled = false;
    return;
  }
  
  try {
    if (loginMode) {
      console.log('Attempting login...');
      await auth.signInWithEmailAndPassword(email, password);
      console.log('Login successful!');
    } else {
      console.log('Attempting registration...');
      await auth.createUserWithEmailAndPassword(email, password);
      console.log('Registration successful!');
    }
  } catch (error) {
    console.error('Auth error:', error);
    document.getElementById('errorMsg').textContent = error.message;
    document.getElementById('authBtn').disabled = false;
  }
}

// Auth State
auth.onAuthStateChanged((user) => {
  console.log('Auth state changed:', user ? user.email : 'No user');
  
  if (user) {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('chatScreen').style.display = 'block';
    document.getElementById('userEmail').textContent = 'Logged in as: ' + user.email;
    loadMessages();
  } else {
    document.getElementById('authScreen').style.display = 'block';
    document.getElementById('chatScreen').style.display = 'none';
    document.getElementById('authBtn').disabled = false;
  }
});

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  
  if (!text || !auth.currentUser) return;
  
  try {
    await db.collection('messages').add({
      text: text,
      sender: auth.currentUser.email,
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
    input.value = '';
    console.log('Message sent');
  } catch (error) {
    console.error('Send error:', error);
  }
}

function loadMessages() {
  db.collection('messages')
    .orderBy('timestamp', 'asc')
    .onSnapshot((snapshot) => {
      const container = document.getElementById('messages');
      container.innerHTML = '';
      
      snapshot.forEach((doc) => {
        const data = doc.data();
        const isOwn = data.sender === auth.currentUser?.email;
        const div = document.createElement('div');
        div.className = 'msg ' + (isOwn ? 'own' : '');
        div.textContent = data.text;
        container.appendChild(div);
      });
      
      container.scrollTop = container.scrollHeight;
    }, (error) => {
      console.error('Load error:', error);
    });
}

async function logout() {
  await auth.signOut();
}
</script>

</body>
</html>
